<body>

 <h1>Testimoni Pembeli</h1>
            
    <main class="formulir">
        <section class="testimoni-container">
           
            <div id="daftarTestimoni"></div>
            
            <div class="aksi-admin">
                <button id="hapusSemua" class="btn-danger">Hapus Semua Testimoni</button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Toko Buku Safina</p>
    </footer>

    <script>
    const container = document.getElementById('daftarTestimoni');
    
    // Mengambil data dari localStorage
    const testimoniList = JSON.parse(localStorage.getItem('testimoniList')) || [];

    if (testimoniList.length === 0) {
        container.innerHTML = '<p>Belum ada testimoni.</p>';
    } else {
       testimoniList.forEach((t) => {
    const el = document.createElement('div');
    el.className = 'testimoni-box'; 
    
    // Menggunakan nama properti yang simple (tanpa bracket notation)
    el.innerHTML = `
        <p><strong>Nama:</strong> ${t.nama || 'Anonim'}</p>
        <p><strong>Email:</strong> ${t.email || '-'}</p>
        <p><strong>Profesi:</strong> ${t.profesi || '-'}</p>
        <p><strong>Rating:</strong> ${t.rating || '0'} / 5 ⭐</p>
        <p><strong>Pesan:</strong> ${t.pesan || '-'}</p>
        <hr>
    `;
    container.appendChild(el);
});
    }

    // Event listener untuk hapus semua
    document.getElementById('hapusSemua').addEventListener("click", function() {
        const konfirmasi = confirm("Apakah anda yakin ingin menghapus seluruh testimoni?");
        if (konfirmasi) {
            localStorage.removeItem("testimoniList");
            location.reload();
        }
    });
</script>

</body>

</html>
