<h1>Berikan Testimoni Anda</h1>
<main class="formulir">
    
    <form id="formtestimoni">
        <label for="nama">Nama:</label>
        <input type="text" id="nama" name="nama" required placeholder="Nama lengkap anda">

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required placeholder="email@example.com">

        <label for="profesi">Profesi/Jabatan:</label>
        <input type="text" id="profesi" name="profesi" required placeholder="Profesi atau Jabatan anda">

        <label for="rating">Star Rating (1-5):</label>
        <input type="number" id="rating" name="rating" min="1" max="5" placeholder="Nilai buku yang anda baca">

        <label for="pesan">Testimoni Anda:</label>
        <textarea id="pesan" name="pesan" rows="5" required placeholder="Tulis pengalaman Anda tentang buku kami..."></textarea>
        
        <button type="submit">Kirim Pengalaman Saya</button>
    </form>
</main>

    <footer>
        <p>&copy; 2026 Toko Buku Safina</p>
    </footer>

    <script>
       document.getElementById('formtestimoni').addEventListener('submit', function(e) {
    e.preventDefault(); 

    // Ambil data (Nama variabel tidak boleh ada spasi atau /)
    const nama = document.getElementById('nama').value;
    const email = document.getElementById('email').value;
    const profesi = document.getElementById('profesi').value; // ID tetap pakai yang di HTML
    const rating = document.getElementById('rating').value; // ID harus sesuai dengan atribut id di HTML
    const pesan = document.getElementById('pesan').value;

    // Membuat objek testimoni (Gunakan nama variabel yang sudah diperbaiki)
    // Di file testimoni.html
const dataBaru = {
    nama: nama,
    email: email,
    profesi: profesi, // Pakai nama simple saja
    rating: rating,   // Pakai nama simple saja
    pesan: pesan
};

   // Simpan data
const testimoniList = JSON.parse(localStorage.getItem('testimoniList')) || [];
testimoniList.push(dataBaru);
localStorage.setItem('testimoniList', JSON.stringify(testimoniList));

// Beri feedback visual tanpa memblokir layar
const tombolKirim = document.querySelector('button[type="submit"]');
tombolKirim.innerText = "Mengirim...";
tombolKirim.disabled = true; // Mencegah klik ganda

// Tunggu 1.5 detik agar terlihat lebih natural sebelum pindah halaman
setTimeout(() => {
    window.location.href = 'proses-testimoni.html';
}, 1500);
});


        </script>
